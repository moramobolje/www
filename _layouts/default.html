<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Moramo bolje!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Overpass+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    {% include analytics.html %}
    <style>
        body { font-family: 'Inter', sans-serif; }
        .footer-slim { font-size: 0.65rem; letter-spacing: 0.5px; opacity: 0.8; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm py-2 mb-4">
        <div class="container-fluid px-md-5">
            <a class="navbar-brand fw-bolder text-dark d-flex align-items-center" href="{{ '/' | relative_url }}">
                 Moramo bolje!
            </a>
            {% if page.url != "/" %}
            <span class="text-muted small border-start ps-3 d-none d-md-inline">Projekti / {{ page.title }}</span>
            {% endif %}
        </div>
    </nav>

    <main class="flex-grow-1">
        {{ content }}
    </main>

    <footer class="mt-auto py-2 bg-white border-top">
        <div class="container text-center">
            <div class="text-muted footer-slim fw-medium">
                moramobolje.com
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ '/assets/js/cookie_consent_v2.js' | relative_url }}"></script>
</body>
</html>
